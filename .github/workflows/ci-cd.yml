name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: '18'

    - run: cd app && npm install
    - run: cd app && npm test

    - name: Build Docker Image
      run: docker build -t devops-demo .